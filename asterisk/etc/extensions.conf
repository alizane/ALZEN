[globals]
; ALZEN V3.0 — Voice Closer dial plan

[default]
exten => _X.,1,NoOp(ALZEN Voice Closer — Outbound Call)
exten => _X.,n,Set(CALLERID(name)=Alex)
exten => _X.,n,Set(CALLERID(num)=${CALLERID(number)})
exten => _X.,n,Dial(SIP/${EXTEN}@alzen-trunk,30)
exten => _X.,n,Hangup()

[internal]
exten => 100,1,Answer()
exten => 100,n,Playback(beep)
exten => 100,n,Hangup()

[google-tts]
exten => s,1,NoOp(TTS Callback)
exten => s,n,Answer()
exten => s,n,Wait(1)
exten => s,n,System(echo "${TTS_TEXT}" | /usr/bin/tts-synthesize)
exten => s,n,Hangup()
