# ALZEN V3.0 — Hermes Agent Configuration (DeepSeek Only Edition)
# Copy to ~/.hermes/cli-config.yaml or keep in project root

model:
  default: "deepseek/deepseek-chat-v3"

inference:
  provider: "openrouter"
  # OPENROUTER_API_KEY can be set in .env.hermes

generation:
  max_tokens: 1000
  temperature: 0.7

system_prompt_file: "./hermes/SOUL.md"

mcp_servers:
  - name: alzen-knowledge-graph
    url: http://localhost:8889/mcp
    description: "ALZEN full codebase knowledge graph — query before acting"
    always_load: true

subagents:
  enabled: true
  isolation: full
  max_concurrent: 10
  workspace_mode: ephemeral
  inherit_mcp: true
  inherit_skills: true
  write_results_to: "./vault/"

working_directory: "D:/ALZEN"
vault_dir: "D:/ALZEN/vault"
skills_dir: "D:/ALZEN/skills"
