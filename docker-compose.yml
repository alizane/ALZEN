version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: alzen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alzen_db
      POSTGRES_USER: alzen_admin
      POSTGRES_PASSWORD: Hiking@786
    ports:
      - "5432:5432"
    volumes:
      - alzen_pg_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alzen_admin -d alzen_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: alzen_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: allauddin1524@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Hiking@786
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: alzen_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - alzen_redis_data:/data

volumes:
  alzen_pg_data:
  alzen_redis_data: